version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: gaming
      POSTGRES_PASSWORD: gaming
      POSTGRES_DB: gaming_store
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata: